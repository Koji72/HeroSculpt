<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Superhero 3D Customizer</title>

  <style>
    /* Premium Gaming Fonts */
    @font-face {
      font-family: 'RefrigeratorDeluxeHeavy';
      src: url('./assets/ui/RefrigeratorDeluxeHeavy_0b54d629.ttf') format('truetype');
      font-weight: 900;
      font-style: normal;
    }
    
    @font-face {
      font-family: 'RefrigeratorDeluxeBold';
      src: url('./assets/ui/RefrigeratorDeluxeBold_30fce753.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    
    @font-face {
      font-family: 'RefrigeratorDeluxeExtrabold';
      src: url('./assets/ui/RefrigeratorDeluxeExtrabold_fd7fc0ff.ttf') format('truetype');
      font-weight: 800;
      font-style: normal;
    }
    
    /* Gaming Animations */
    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 20px rgba(249, 115, 22, 0.5); }
      50% { box-shadow: 0 0 30px rgba(249, 115, 22, 0.8); }
    }
    
    @keyframes holographic {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* Reset and viewport setup */
    * {
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    #root {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
    }
    
    /* Custom scrollbar for webkit browsers - Gaming Theme */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a; /* slate-900 */
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(45deg, #f97316, #fbbf24); /* orange-500 to amber-400 */
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(45deg, #ea580c, #f59e0b); /* orange-600 to amber-500 */
    }
    
    body {
      overscroll-behavior-y: contain; /* Prevents pull-to-refresh on mobile when scrolling sidebar */
      font-family: 'RefrigeratorDeluxeBold', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      overflow-x: hidden; /* Prevent horizontal scroll caused by sliding panels */
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    }
    
    /* Gaming utility classes */
    .animate-scan {
      animation: scan 4s linear infinite;
    }
    
    .animate-float {
      animation: float 3s ease-in-out infinite;
    }
    
    .animate-glow {
      animation: glow 2s ease-in-out infinite alternate;
    }
    
    .animate-holographic {
      animation: holographic 3s ease-in-out infinite;
      background-size: 400% 400%;
    }
  </style>

<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-950 text-slate-100 antialiased">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
