<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symbol Model Test</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.150.1/build/three.module.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.150.1/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.150.1/examples/jsm/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'https://unpkg.com/three@0.150.1/examples/jsm/loaders/DRACOLoader.js';

        let scene, camera, renderer, controls;
        const modelPath = 'assets/strong/symbol/strong_symbol_01_t01.glb'; // Path to your symbol model

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xcccccc); // Light grey background

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1, 3); // Adjust camera position to see the model

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // An animation loop is required when damping is enabled
            controls.dampingFactor = 0.25;
            controls.screenSpacePanning = false;
            controls.maxPolarAngle = Math.PI / 2;

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(1, 1, 1).normalize();
            scene.add(directionalLight);

            // Load GLB model
            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('draco/'); // Assuming draco decoders are in public/draco

            const loader = new GLTFLoader();
            loader.setDRACOLoader(dracoLoader);

            loader.load(
                modelPath,
                (gltf) => {
                    if (gltf.scene) {
                        scene.add(gltf.scene);
                        // Optional: Center and scale the model
                        const box = new THREE.Box3().setFromObject(gltf.scene);
                        const center = box.getCenter(new THREE.Vector3());
                        const size = box.getSize(new THREE.Vector3());

                        gltf.scene.position.sub(center); // Center the model

                        // Fit to screen by scaling if too large
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const desiredSize = 1; // Arbitrary desired size in scene units
                        const scale = desiredSize / maxDim;
                        gltf.scene.scale.set(scale, scale, scale);

                        console.log('Model loaded successfully:', modelPath);
                        console.log('Model details:', gltf.scene);
                    } else {
                        console.error('GLTF scene is null or undefined.');
                    }
                },
                (xhr) => {
                    console.log((xhr.loaded / xhr.total * 100) + '% loaded');
                },
                (error) => {
                    console.error('Error loading model:', modelPath, error);
                }
            );

            // Animation loop
            function animate() {
                requestAnimationFrame(animate);
                controls.update(); // only required if controls.enableDamping is set to true
                renderer.render(scene, camera);
            }
            animate();

            // Handle window resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }, false);
        }

        init();
    </script>
</body>
</html>
