<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutants & Masterminds Character Sheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .bg-gradient-to-br { background: linear-gradient(to bottom right, var(--tw-gradient-stops)); }
        .bg-gradient-to-r { background: linear-gradient(to right, var(--tw-gradient-stops)); }
        .from-purple-900 { --tw-gradient-from: #581c87; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgba(88, 28, 135, 0)); }
        .via-red-900 { --tw-gradient-stops: var(--tw-gradient-from), #7f1d1d, var(--tw-gradient-to, rgba(127, 29, 29, 0)); }
        .to-orange-800 { --tw-gradient-to: #9a3412; }
        .from-orange-600 { --tw-gradient-from: #ea580c; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgba(234, 88, 12, 0)); }
        .to-red-600 { --tw-gradient-to: #dc2626; }
        .from-green-600 { --tw-gradient-from: #16a34a; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgba(22, 163, 74, 0)); }
        .to-green-800 { --tw-gradient-to: #166534; }
        .from-blue-600 { --tw-gradient-from: #2563eb; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgba(37, 99, 235, 0)); }
        .to-blue-800 { --tw-gradient-to: #1e40af; }
        .from-red-600 { --tw-gradient-from: #dc2626; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgba(220, 38, 38, 0)); }
        .to-red-800 { --tw-gradient-to: #991b1b; }
        .from-purple-600 { --tw-gradient-from: #9333ea; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgba(147, 51, 234, 0)); }
        .to-purple-800 { --tw-gradient-to: #6b21a8; }
        .from-teal-600 { --tw-gradient-from: #0d9488; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgba(13, 148, 136, 0)); }
        .to-teal-800 { --tw-gradient-to: #115e59; }
        .from-orange-600 { --tw-gradient-from: #ea580c; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgba(234, 88, 12, 0)); }
        .to-orange-800 { --tw-gradient-to: #9a3412; }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen bg-gradient-to-br from-purple-900 via-red-900 to-orange-800 p-4">
        <div class="max-w-6xl mx-auto bg-gray-900/90 backdrop-blur-sm rounded-xl shadow-2xl overflow-hidden">
            
            <!-- Header -->
            <div class="bg-gradient-to-r from-orange-600 to-red-600 p-4 flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <h1 class="text-3xl font-bold text-white tracking-wider">MUTANTS & MASTERMINDS</h1>
                    <span class="bg-yellow-400 text-black px-3 py-1 rounded-full font-bold text-sm">
                        COMPLICATIONS
                    </span>
                </div>
                
                <div class="flex items-center space-x-2">
                    <button id="editButton" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg flex items-center space-x-2 transition-colors">
                        <i data-lucide="edit-2" class="w-4 h-4"></i>
                        <span>Edit</span>
                    </button>
                </div>
            </div>

            <!-- Character Info -->
            <div class="bg-yellow-400 p-3 flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <span class="text-black font-semibold">Player:</span>
                    <input id="playerName" type="text" value="JOHN WADE" class="text-black font-bold bg-transparent border-none outline-none">
                </div>
                
                <div class="text-4xl font-black text-black tracking-widest">
                    <input id="characterName" type="text" value="JOHNNY ROCKET" class="text-4xl font-black text-black tracking-widest bg-transparent border-none outline-none text-center">
                </div>
                
                <div class="flex items-center space-x-2">
                    <span class="text-black font-semibold">Level:</span>
                    <input id="characterLevel" type="number" value="11" min="1" max="20" class="text-black font-bold text-xl bg-transparent border-none outline-none w-16 text-center">
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 p-6">
                
                <!-- Left Column - Defenses & Abilities -->
                <div class="space-y-6">
                    
                    <!-- Defenses -->
                    <div class="bg-gradient-to-br from-green-600 to-green-800 rounded-lg p-4">
                        <h3 class="text-yellow-300 font-bold text-xl mb-4 border-b border-yellow-300/30 pb-2">DEFENSES</h3>
                        <div id="defensesContainer" class="space-y-3">
                            <!-- Defenses will be populated by JavaScript -->
                        </div>
                    </div>

                    <!-- Abilities -->
                    <div class="bg-gradient-to-br from-blue-600 to-blue-800 rounded-lg p-4">
                        <h3 class="text-yellow-300 font-bold text-xl mb-4 border-b border-yellow-300/30 pb-2">ABILITIES</h3>
                        <div id="abilitiesContainer" class="grid grid-cols-2 gap-2">
                            <!-- Abilities will be populated by JavaScript -->
                        </div>
                    </div>
                </div>

                <!-- Center Column - Attacks & Powers -->
                <div class="space-y-6">
                    
                    <!-- Attacks -->
                    <div class="bg-gradient-to-br from-red-600 to-red-800 rounded-lg p-4">
                        <h3 class="text-yellow-300 font-bold text-xl mb-4 border-b border-yellow-300/30 pb-2">ATTACKS</h3>
                        <div id="attacksContainer" class="space-y-2">
                            <!-- Attacks will be populated by JavaScript -->
                        </div>
                        <button id="addAttackBtn" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded flex items-center justify-center space-x-2 mt-2 hidden">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            <span>Add Attack</span>
                        </button>
                    </div>

                    <!-- Powers -->
                    <div class="bg-gradient-to-br from-purple-600 to-purple-800 rounded-lg p-4">
                        <h3 class="text-yellow-300 font-bold text-xl mb-4 border-b border-yellow-300/30 pb-2">POWERS</h3>
                        <div id="powersContainer" class="space-y-2 max-h-64 overflow-y-auto">
                            <!-- Powers will be populated by JavaScript -->
                        </div>
                    </div>
                </div>

                <!-- Right Column - Skills -->
                <div class="space-y-6">
                    
                    <!-- Skills -->
                    <div class="bg-gradient-to-br from-teal-600 to-teal-800 rounded-lg p-4">
                        <h3 class="text-yellow-300 font-bold text-xl mb-4 border-b border-yellow-300/30 pb-2">SKILLS</h3>
                        <div id="skillsContainer" class="space-y-2 max-h-96 overflow-y-auto">
                            <!-- Skills will be populated by JavaScript -->
                        </div>
                    </div>
                    
                    <!-- Conditions -->
                    <div class="bg-gradient-to-br from-orange-600 to-orange-800 rounded-lg p-4">
                        <h3 class="text-yellow-300 font-bold text-xl mb-4 border-b border-yellow-300/30 pb-2">CONDITIONS</h3>
                        <div id="conditionsContainer" class="grid grid-cols-2 gap-2">
                            <!-- Conditions will be populated by JavaScript -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Character data
        let character = {
            name: "JOHNNY ROCKET",
            player: "JOHN WADE",
            complications: "COMPLICATIONS",
            level: 11,
            
            // Conditions
            conditions: {
                fatigued: false,
                dazed: false,
                staggered: false,
                incapacitated: false,
                disabled: false,
                dying: false,
                unconscious: false
            },
            
            // Defenses
            defenses: {
                dodge: { value: 16, temp: 0, total: 16 },
                parry: { value: 16, temp: 0, total: 16 },
                fortitude: { value: 9, temp: 0, total: 9 },
                toughness: { value: 6, temp: 0, total: 6 },
                will: { value: 8, temp: 0, total: 8 }
            },
            
            // Abilities
            abilities: {
                strength: { value: 2, cost: 2 },
                stamina: { value: 3, cost: 3 },
                agility: { value: 5, cost: 5 },
                dexterity: { value: 4, cost: 4 },
                fighting: { value: 5, cost: 5 },
                intellect: { value: 1, cost: 1 },
                awareness: { value: 2, cost: 2 },
                presence: { value: 3, cost: 3 }
            },
            
            // Attacks
            attacks: [
                { name: "Unarmed", skill: "Unarmed", attack: 5, rank: 5, mod: 0, descriptor: "Bludgeoning", dc: 17, crit: 20 },
                { name: "Throw", skill: "Throw", attack: 13, rank: 13, mod: 0, descriptor: "Bludgeoning", dc: 17, crit: 20 },
                { name: "Non-Spinning Tornado", skill: "Combat Skill", attack: 0, rank: 0, mod: 0, descriptor: "Bludgeoning", dc: 18, crit: 20 },
                { name: "Fast Attack", skill: "Combat Skill", attack: 0, rank: 3, mod: 0, descriptor: "Bludgeoning", dc: 18, crit: 20 },
                { name: "Flurry of Blows", skill: "Unarmed", attack: 5, rank: 0, mod: 0, descriptor: "Bludgeoning", dc: 16, crit: 20 }
            ],
            
            // Powers
            powers: [
                { name: "Super Speed", type: "Mutant", cost: 76 },
                { name: "Enhanced Traits", type: "Mutant", cost: 24 },
                { name: "Enhanced Advantages", type: "Mutant", cost: 16 },
                { name: "Enhanced Dodge", type: "Mutant", cost: 16 },
                { name: "Enhanced Parry", type: "Mutant", cost: 16 },
                { name: "Speed", type: "Mutant", cost: 12 },
                { name: "Running Speed", type: "Mutant", cost: 10 },
                { name: "Movement", type: "Mutant", cost: 8 },
                { name: "Wall Crawling", type: "Mutant", cost: 2 },
                { name: "Water Walking", type: "Mutant", cost: 2 },
                { name: "Quickness", type: "Mutant", cost: 12 }
            ],
            
            // Skills
            skills: {
                acrobatics: { value: 5, ability: "agility" },
                athletics: { value: 2, ability: "strength" },
                deception: { value: 3, ability: "presence" },
                expertise: { value: 1, ability: "intellect" },
                insight: { value: 2, ability: "awareness" },
                intimidation: { value: 3, ability: "presence" },
                investigation: { value: 1, ability: "intellect" },
                perception: { value: 2, ability: "awareness" },
                persuasion: { value: 3, ability: "presence" },
                stealth: { value: 5, ability: "agility" },
                technology: { value: 1, ability: "intellect" },
                treatment: { value: 1, ability: "intellect" },
                vehicles: { value: 4, ability: "dexterity" }
            }
        };

        let isEditing = false;

        // Update character data
        function updateCharacter(path, value) {
            const keys = path.split('.');
            let current = character;
            
            for (let i = 0; i < keys.length - 1; i++) {
                current = current[keys[i]];
            }
            
            current[keys[keys.length - 1]] = value;
            renderCharacter();
        }

        // Toggle edit mode
        function toggleEditMode() {
            isEditing = !isEditing;
            const editButton = document.getElementById('editButton');
            const addAttackBtn = document.getElementById('addAttackBtn');
            
            if (isEditing) {
                editButton.innerHTML = '<i data-lucide="save" class="w-4 h-4"></i><span>Save</span>';
                addAttackBtn.classList.remove('hidden');
            } else {
                editButton.innerHTML = '<i data-lucide="edit-2" class="w-4 h-4"></i><span>Edit</span>';
                addAttackBtn.classList.add('hidden');
            }
            
            lucide.createIcons();
            renderCharacter();
        }

        // Render defenses
        function renderDefenses() {
            const container = document.getElementById('defensesContainer');
            container.innerHTML = '';
            
            Object.entries(character.defenses).forEach(([key, defense]) => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between bg-black/20 rounded p-2';
                div.innerHTML = `
                    <span class="text-white font-semibold capitalize">${key}</span>
                    <div class="flex items-center space-x-2">
                        <input type="number" value="${defense.value}" min="0" max="20" 
                               class="text-white font-bold text-lg w-12 text-center bg-transparent border-none outline-none ${!isEditing ? 'pointer-events-none' : ''}"
                               onchange="updateCharacter('defenses.${key}.value', parseInt(this.value) || 0)">
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Render abilities
        function renderAbilities() {
            const container = document.getElementById('abilitiesContainer');
            container.innerHTML = '';
            
            Object.entries(character.abilities).forEach(([key, ability]) => {
                const div = document.createElement('div');
                div.className = 'bg-black/20 rounded p-2 text-center';
                div.innerHTML = `
                    <div class="text-white font-semibold text-sm capitalize mb-1">${key}</div>
                    <input type="number" value="${ability.value}" min="0" max="10" 
                           class="text-white font-bold text-lg bg-transparent border-none outline-none text-center ${!isEditing ? 'pointer-events-none' : ''}"
                           onchange="updateCharacter('abilities.${key}.value', parseInt(this.value) || 0)">
                `;
                container.appendChild(div);
            });
        }

        // Render attacks
        function renderAttacks() {
            const container = document.getElementById('attacksContainer');
            container.innerHTML = '';
            
            character.attacks.forEach((attack, index) => {
                const div = document.createElement('div');
                div.className = 'bg-black/20 rounded p-3';
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <input type="text" value="${attack.name}" 
                               class="text-yellow-300 font-bold bg-transparent border-none outline-none ${!isEditing ? 'pointer-events-none' : ''}"
                               onchange="updateCharacter('attacks.${index}.name', this.value)">
                        ${isEditing ? `<button onclick="removeAttack(${index})" class="text-red-400 hover:text-red-300">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>` : ''}
                    </div>
                    <div class="grid grid-cols-3 gap-2 text-sm">
                        <div class="text-center">
                            <div class="text-gray-300">Attack</div>
                            <input type="number" value="${attack.attack}" min="0" max="20" 
                                   class="text-white font-bold bg-transparent border-none outline-none text-center ${!isEditing ? 'pointer-events-none' : ''}"
                                   onchange="updateCharacter('attacks.${index}.attack', parseInt(this.value) || 0)">
                        </div>
                        <div class="text-center">
                            <div class="text-gray-300">DC</div>
                            <input type="number" value="${attack.dc}" min="10" max="30" 
                                   class="text-white font-bold bg-transparent border-none outline-none text-center ${!isEditing ? 'pointer-events-none' : ''}"
                                   onchange="updateCharacter('attacks.${index}.dc', parseInt(this.value) || 0)">
                        </div>
                        <div class="text-center">
                            <div class="text-gray-300">Crit</div>
                            <input type="number" value="${attack.crit}" min="16" max="20" 
                                   class="text-white font-bold bg-transparent border-none outline-none text-center ${!isEditing ? 'pointer-events-none' : ''}"
                                   onchange="updateCharacter('attacks.${index}.crit', parseInt(this.value) || 0)">
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            
            lucide.createIcons();
        }

        // Render powers
        function renderPowers() {
            const container = document.getElementById('powersContainer');
            container.innerHTML = '';
            
            character.powers.forEach((power, index) => {
                const div = document.createElement('div');
                div.className = 'bg-black/20 rounded p-2 flex justify-between items-center';
                div.innerHTML = `
                    <div>
                        <input type="text" value="${power.name}" 
                               class="text-white font-semibold bg-transparent border-none outline-none ${!isEditing ? 'pointer-events-none' : ''}"
                               onchange="updateCharacter('powers.${index}.name', this.value)">
                        <div class="text-gray-300 text-sm">${power.type}</div>
                    </div>
                    <div class="text-right flex items-center">
                        <input type="number" value="${power.cost}" min="1" 
                               class="text-yellow-300 font-bold bg-transparent border-none outline-none text-right w-16 ${!isEditing ? 'pointer-events-none' : ''}"
                               onchange="updateCharacter('powers.${index}.cost', parseInt(this.value) || 0)">
                        ${isEditing ? `<button onclick="removePower(${index})" class="text-red-400 hover:text-red-300 ml-2">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>` : ''}
                    </div>
                `;
                container.appendChild(div);
            });
            
            lucide.createIcons();
        }

        // Render skills
        function renderSkills() {
            const container = document.getElementById('skillsContainer');
            container.innerHTML = '';
            
            Object.entries(character.skills).forEach(([key, skill]) => {
                const div = document.createElement('div');
                div.className = 'bg-black/20 rounded p-2 flex justify-between items-center';
                div.innerHTML = `
                    <span class="text-white font-semibold capitalize">${key}</span>
                    <div class="flex items-center space-x-2">
                        <input type="number" value="${skill.value}" min="0" max="20" 
                               class="text-yellow-300 font-bold w-12 text-center bg-transparent border-none outline-none ${!isEditing ? 'pointer-events-none' : ''}"
                               onchange="updateCharacter('skills.${key}.value', parseInt(this.value) || 0)">
                        <span class="text-gray-400 text-sm">
                            +${character.abilities[skill.ability]?.value || 0}
                        </span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Render conditions
        function renderConditions() {
            const container = document.getElementById('conditionsContainer');
            container.innerHTML = '';
            
            Object.entries(character.conditions).forEach(([key, active]) => {
                const div = document.createElement('div');
                div.className = 'flex items-center space-x-2';
                div.innerHTML = `
                    <input type="checkbox" ${active ? 'checked' : ''} ${!isEditing ? 'disabled' : ''}
                           class="w-4 h-4 text-red-600 bg-gray-100 border-gray-300 rounded focus:ring-red-500"
                           onchange="updateCharacter('conditions.${key}', this.checked)">
                    <span class="text-sm capitalize ${active ? 'text-red-300' : 'text-gray-300'}">
                        ${key}
                    </span>
                `;
                container.appendChild(div);
            });
        }

        // Remove attack
        function removeAttack(index) {
            character.attacks.splice(index, 1);
            renderCharacter();
        }

        // Remove power
        function removePower(index) {
            character.powers.splice(index, 1);
            renderCharacter();
        }

        // Add new attack
        function addAttack() {
            const newAttack = {
                name: "New Attack",
                skill: "Combat Skill",
                attack: 0,
                rank: 0,
                mod: 0,
                descriptor: "Bludgeoning",
                dc: 15,
                crit: 20
            };
            character.attacks.push(newAttack);
            renderCharacter();
        }

        // Render entire character
        function renderCharacter() {
            renderDefenses();
            renderAbilities();
            renderAttacks();
            renderPowers();
            renderSkills();
            renderConditions();
        }

        // Event listeners
        document.getElementById('editButton').addEventListener('click', toggleEditMode);
        document.getElementById('addAttackBtn').addEventListener('click', addAttack);
        
        // Character info inputs
        document.getElementById('playerName').addEventListener('input', (e) => {
            character.player = e.target.value;
        });
        
        document.getElementById('characterName').addEventListener('input', (e) => {
            character.name = e.target.value;
        });
        
        document.getElementById('characterLevel').addEventListener('input', (e) => {
            character.level = parseInt(e.target.value) || 1;
        });

        // Initial render
        renderCharacter();
    </script>
</body>
</html>
