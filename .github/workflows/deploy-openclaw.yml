name: Deploy to OpenClaw VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 72.62.16.119
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: /usr/local/bin/deploy-herosculpt.sh
          command_timeout: 5m
