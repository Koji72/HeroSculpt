name: Deploy HeroSculpt

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_BACKEND_URL: "https://herosculpt.loca.lt"
          NODE_ENV: production

      - name: Create archive
        run: |
          cd dist && zip -r ../herosculpt-dist.zip . && cd ..
          echo "Archive: $(du -sh herosculpt-dist.zip | cut -f1)"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            herosculpt-dist.zip
          retention-days: 1

  deploy-hostinger:
    name: Deploy → Hostinger Staging
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Deploy to Hostinger
        run: node scripts/deploy-hostinger.js herosculpt-dist.zip
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}

  deploy-vps:
    name: Deploy → OpenClaw VPS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        with:
          host: 72.62.16.119
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,RESEND_API_KEY,SUPABASE_SERVICE_KEY
          script: |
            /usr/local/bin/deploy-herosculpt.sh
            printf 'STRIPE_SECRET_KEY=%s\nSTRIPE_WEBHOOK_SECRET=%s\nRESEND_API_KEY=%s\nSUPABASE_SERVICE_KEY=%s\n' "$STRIPE_SECRET_KEY" "$STRIPE_WEBHOOK_SECRET" "$RESEND_API_KEY" "$SUPABASE_SERVICE_KEY" > /docker/openclaw-cd97/data/.openclaw/workspace/HeroSculpt/.env.server
            docker exec openclaw-cd97-openclaw-1 pkill -f "node complete-server" 2>/dev/null || true
            docker exec openclaw-cd97-openclaw-1 pkill -f "serve.*5177" 2>/dev/null || true
            docker exec openclaw-cd97-openclaw-1 pkill -f "lt --port" 2>/dev/null || true
            sleep 2
            docker exec -d openclaw-cd97-openclaw-1 bash -c "cd /data/.openclaw/workspace/HeroSculpt && node complete-server.cjs >> /tmp/herosculpt-backend.log 2>&1"
            sleep 3
            docker exec -d openclaw-cd97-openclaw-1 bash -c "nohup npx localtunnel --port 3001 --subdomain herosculpt > /tmp/herosculpt-tunnel.log 2>&1 &"
          command_timeout: 5m
